# apps/postgresql/application.yaml

# Application 1: SealedSecret + Kasten Policy (non-Helm resources)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql-resources
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ataha/gitops-infra.git
    targetRevision: main
    path: apps/postgresql
    directory:
      include: '{sealed-postgres-secret.yaml,policy-postgresql.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: postgresql
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# Application 2: the Bitnami Helm chart (unchanged from before)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  sources:
    - repoURL: registry-1.docker.io/bitnamicharts
      chart: postgresql
      targetRevision: latest
      helm:
        releaseName: postgresql
        valueFiles:
          - $values/apps/postgresql/values.yaml
    - repoURL: https://github.com/ataha/gitops-infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: postgresql
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true